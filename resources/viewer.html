<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRad2 HyCal Event Viewer</title>
<script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
<style>
:root { --bg:#1a1a2e; --panel:#16213e; --border:#0f3460; --text:#e0e0e0; --accent:#00b4d8; --dim:#888; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Consolas','SF Mono',monospace; background:var(--bg); color:var(--text); overflow:hidden; }

/* --- header bar --- */
.header {
    display:flex; align-items:center; gap:16px;
    padding:8px 16px; background:var(--panel); border-bottom:1px solid var(--border);
}
.header h1 { font-size:15px; font-weight:600; color:var(--accent); white-space:nowrap; }
.header .nav { display:flex; align-items:center; gap:6px; }
.header button {
    background:var(--border); border:none; color:var(--text); padding:4px 12px;
    border-radius:3px; cursor:pointer; font-family:inherit; font-size:13px;
}
.header button:hover { background:var(--accent); color:#000; }
.header input[type="number"] {
    width:72px; background:var(--bg); border:1px solid var(--border); color:var(--text);
    padding:3px 6px; border-radius:3px; font-family:inherit; font-size:13px; text-align:center;
}
.header .info { color:var(--dim); font-size:11px; margin-left:auto; }

/* --- main layout: geo (large) | detail (narrow) --- */
.main { display:flex; height:calc(100vh - 40px); }

.geo-panel {
    flex:none; width:65%; display:flex; flex-direction:column; min-width:300px;
}
.divider {
    flex:none; width:5px; cursor:col-resize; background:var(--border);
}
.divider:hover, .divider.active { background:var(--accent); }
.geo-toolbar {
    display:flex; align-items:center; gap:8px; padding:5px 10px;
    background:var(--panel); border-bottom:1px solid var(--border); font-size:12px; flex-shrink:0;
}
.geo-toolbar label { color:var(--dim); }
.geo-toolbar select, .geo-toolbar input[type="checkbox"] {
    background:var(--bg); border:1px solid var(--border); color:var(--text);
    padding:2px 6px; border-radius:3px; font-family:inherit; font-size:12px;
}
.geo-canvas-wrap { flex:1; position:relative; overflow:hidden; }
.geo-canvas-wrap canvas { position:absolute; top:0; left:0; }
.geo-tooltip {
    display:none; position:absolute; background:rgba(0,0,0,0.92); color:#fff;
    padding:5px 9px; border-radius:3px; font-size:11px; pointer-events:none;
    white-space:pre; z-index:10; line-height:1.5;
}

/* --- detail panel (right) --- */
.detail-panel {
    flex:1; display:flex; flex-direction:column; min-width:280px; overflow:hidden;
}
.detail-header {
    padding:6px 10px; background:var(--panel); border-bottom:1px solid var(--border);
    font-size:13px; flex-shrink:0;
}
.detail-header .mod-name { color:var(--accent); font-weight:600; }
.detail-header .mod-daq { color:var(--dim); font-size:11px; }

.waveform-wrap { flex:none; height:55%; min-height:150px; }

.hdivider {
    flex:none; height:5px; cursor:row-resize; background:var(--border);
}
.hdivider:hover, .hdivider.active { background:var(--accent); }

.peaks-table-wrap {
    flex:1; overflow-y:auto; font-size:12px; min-height:80px;
}
.peaks-table { width:100%; border-collapse:collapse; }
.peaks-table th {
    position:sticky; top:0; background:var(--panel); padding:4px 8px;
    text-align:right; color:var(--dim); font-weight:500; border-bottom:1px solid var(--border);
}
.peaks-table th:first-child, .peaks-table td:first-child { text-align:center; }
.peaks-table td { padding:3px 8px; text-align:right; border-bottom:1px solid #1a1a2e; }
.peaks-table tr:hover { background:rgba(0,180,216,0.08); }

.color-bar { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--dim); }
.status-bar {
    position:fixed; bottom:0; left:0; right:0;
    padding:3px 12px; background:var(--panel); border-top:1px solid var(--border);
    font-size:11px; color:var(--dim); z-index:20;
}
.empty-msg { padding:30px 20px; color:var(--dim); text-align:center; font-size:13px; }
</style>
</head>
<body>

<div class="header">
    <h1>PRad2 HyCal Viewer</h1>
    <div class="nav">
        <button id="btn-prev" title="← Arrow key">◀</button>
        <input type="number" id="ev-input" value="1" min="1">
        <span style="color:var(--dim);font-size:12px" id="ev-total">/ 0</span>
        <button id="btn-next" title="→ Arrow key">▶</button>
    </div>
    <div class="info" id="header-info"></div>
</div>

<div class="main">
    <!-- geo view (left) -->
    <div class="geo-panel" id="geo-panel">
        <div class="geo-toolbar">
            <label>Color:</label>
            <select id="color-metric">
                <option value="integral">Peak Integral</option>
                <option value="height">Peak Height</option>
                <option value="pedestal">Pedestal</option>
            </select>
            <label>Log</label>
            <input type="checkbox" id="log-scale" checked>
            <div class="color-bar">
                <span>0</span>
                <canvas id="colorbar-canvas" width="120" height="12"></canvas>
                <span id="colorbar-max">max</span>
            </div>
        </div>
        <div class="geo-canvas-wrap" id="geo-wrap">
            <canvas id="geo-canvas"></canvas>
            <div class="geo-tooltip" id="geo-tooltip"></div>
        </div>
    </div>

    <!-- draggable divider -->
    <div class="divider" id="divider"></div>

    <!-- detail panel (right) -->
    <div class="detail-panel" id="detail-panel">
        <div class="detail-header" id="detail-header">
            <div class="empty-msg">Click a module to view waveform</div>
        </div>
        <div class="waveform-wrap" id="waveform-div"></div>
        <div class="hdivider" id="hdivider"></div>
        <div class="peaks-table-wrap" id="peaks-wrap">
            <table class="peaks-table">
                <thead><tr>
                    <th>#</th><th>Pos</th><th>Time (ns)</th><th>Height</th>
                    <th>Integral</th><th>Left</th><th>Right</th><th>OVF</th>
                </tr></thead>
                <tbody id="peaks-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="status-bar" id="status-bar">Ready</div>

<script>
// =========================================================================
// State
// =========================================================================
let modules = [], totalEvents = 0, currentEvent = 1;
let eventChannels = {};
let selectedModule = null, hoveredModule = null;
let geoCanvas, geoCtx, geoWrap, scale = 1, offsetX = 0, offsetY = 0, canvasW, canvasH;
const PC = ['#00b4d8','#ff6b6b','#51cf66','#ffd43b','#cc5de8','#ff922b','#20c997','#f06595'];

// =========================================================================
// Color scale
// =========================================================================
function viridis(t) {
    t = Math.max(0, Math.min(1, t));
    const r = Math.round(255*Math.min(1,Math.max(0,-0.87+4.26*t-4.85*t*t+2.5*t*t*t)));
    const g = Math.round(255*Math.min(1,Math.max(0,-0.03+0.77*t+1.32*t*t-1.87*t*t*t)));
    const b = Math.round(255*Math.min(1,Math.max(0,0.33+1.74*t-4.26*t*t+3.17*t*t*t)));
    return `rgb(${r},${g},${b})`;
}

function drawColorBar() {
    const c = document.getElementById('colorbar-canvas'), ctx = c.getContext('2d');
    for (let i = 0; i < c.width; i++) { ctx.fillStyle = viridis(i/c.width); ctx.fillRect(i,0,1,c.height); }
}

// =========================================================================
// Geometry canvas
// =========================================================================
function initGeo() {
    geoWrap = document.getElementById('geo-wrap');
    geoCanvas = document.getElementById('geo-canvas');
    geoCtx = geoCanvas.getContext('2d');
    resizeGeo();
    new ResizeObserver(resizeGeo).observe(geoWrap);
}

function resizeGeo() {
    canvasW = geoWrap.clientWidth; canvasH = geoWrap.clientHeight;
    if (canvasW < 10 || canvasH < 10) return;
    geoCanvas.width = canvasW; geoCanvas.height = canvasH;
    if (modules.length) fitView();
    drawGeo();
}

function fitView() {
    const m = 15;
    let x0=1e9,x1=-1e9,y0=1e9,y1=-1e9;
    for (const d of modules) {
        x0=Math.min(x0,d.x-d.sx/2); x1=Math.max(x1,d.x+d.sx/2);
        y0=Math.min(y0,d.y-d.sy/2); y1=Math.max(y1,d.y+d.sy/2);
    }
    scale = Math.min((canvasW-2*m)/(x1-x0),(canvasH-2*m)/(y1-y0));
    offsetX = canvasW/2-(x0+x1)/2*scale;
    offsetY = canvasH/2+(y0+y1)/2*scale;
}

function d2c(x,y) { return [x*scale+offsetX, -y*scale+offsetY]; }
function c2d(cx,cy) { return [(cx-offsetX)/scale, -(cy-offsetY)/scale]; }

function modVal(m) {
    const d = eventChannels[`${m.roc}_${m.sl}_${m.ch}`];
    if (!d) return 0;
    const mt = document.getElementById('color-metric').value;
    if (mt==='pedestal') return d.pm||0;
    if (!d.pk||!d.pk.length) return 0;
    if (mt==='height') return Math.max(...d.pk.map(p=>p.h));
    return d.pk.reduce((s,p)=>s+p.i,0);
}

function drawGeo() {
    if (!geoCtx) return;
    const ctx = geoCtx;
    ctx.clearRect(0,0,canvasW,canvasH);
    const useLog = document.getElementById('log-scale').checked;
    const vals = modules.map(modVal);
    const vmax = Math.max(...vals,1);
    document.getElementById('colorbar-max').textContent = vmax.toFixed(0);

    for (let i=0; i<modules.length; i++) {
        const m = modules[i];
        const [cx,cy] = d2c(m.x,m.y);
        const w=m.sx*scale, h=m.sy*scale;
        const v = vals[i];
        const t = vmax>0 ? (useLog ? Math.log1p(v)/Math.log1p(vmax) : v/vmax) : 0;
        ctx.fillStyle = v>0 ? viridis(t) : (m.t==='G' ? '#1a1a2e' : '#12122a');
        ctx.fillRect(cx-w/2, cy-h/2, w, h);

        const sel = selectedModule && selectedModule.n===m.n;
        const hov = hoveredModule && hoveredModule.n===m.n;
        ctx.strokeStyle = sel ? '#fff' : hov ? '#00b4d8' : '#333';
        ctx.lineWidth = sel ? 2.5 : hov ? 1.5 : 0.5;
        ctx.strokeRect(cx-w/2, cy-h/2, w, h);
    }
}

function hitTest(cx,cy) {
    const [dx,dy] = c2d(cx,cy);
    for (let i=modules.length-1; i>=0; i--) {
        const m=modules[i];
        if (Math.abs(dx-m.x)<=m.sx/2 && Math.abs(dy-m.y)<=m.sy/2) return m;
    }
    return null;
}

// =========================================================================
// Waveform + peaks table
// =========================================================================
function showWaveform(mod) {
    selectedModule = mod;
    const key = `${mod.roc}_${mod.sl}_${mod.ch}`;
    const d = eventChannels[key];

    // header: module info + pedestal
    const pedInfo = d ? ` &nbsp; Ped: ${d.pm.toFixed(1)} ± ${d.pr.toFixed(1)}` : '';
    document.getElementById('detail-header').innerHTML =
        `<span class="mod-name">${mod.n}</span> `
        + `<span class="mod-daq">ROC 0x${mod.roc.toString(16)} &middot; slot ${mod.sl} &middot; ch ${mod.ch}${pedInfo}</span>`;

    if (!d || !d.s) {
        Plotly.react('waveform-div', [], {
            ...PLOT_LAYOUT,
            title:{text:`${mod.n} — No data`, font:{size:12, color:'#555'}},
        }, PLOT_CFG);
        document.getElementById('peaks-tbody').innerHTML =
            '<tr><td colspan="8" style="text-align:center;color:var(--dim);padding:8px">No data</td></tr>';
        drawGeo(); return;
    }

    const samples = d.s, peaks = d.pk||[];
    const x = samples.map((_,i) => i);

    // --- plotly traces ---
    const traces = [
        { x, y:samples, type:'scatter', mode:'lines', name:'Waveform',
          line:{color:'#7777aa', width:1} },
        { x:[0,samples.length-1], y:[d.pm,d.pm], type:'scatter', mode:'lines',
          name:`Pedestal`, line:{color:'#555', width:1, dash:'dash'} },
    ];
    const thr = d.pm + Math.max(5*d.pr, 3);
    traces.push({ x:[0,samples.length-1], y:[thr,thr], type:'scatter', mode:'lines',
        line:{color:'#333', width:1, dash:'dot'}, showlegend:false });

    peaks.forEach((p,i) => {
        const col = PC[i%PC.length], px=[], py=[];
        for (let j=p.l; j<=p.r; j++) { px.push(j); py.push(samples[j]); }
        traces.push({ x:px, y:py, type:'scatter', mode:'lines',
            name:`Peak ${i}`, line:{color:col, width:2.5} });
        traces.push({ x:[p.p], y:[samples[p.p]], type:'scatter', mode:'markers',
            marker:{color:col, size:7, symbol:'diamond'}, showlegend:false });
    });

    Plotly.react('waveform-div', traces, {
        ...PLOT_LAYOUT,
        title:{text:`${mod.n} — Event ${currentEvent}`, font:{size:12, color:'#ccc'}},
    }, PLOT_CFG);

    // --- peaks table (only peak rows, no pedestal row) ---
    let rows = '';
    peaks.forEach((p,i) => {
        const col = PC[i%PC.length];
        rows += `<tr style="border-left:3px solid ${col}">`
              + `<td>${i}</td><td>${p.p}</td><td>${p.t.toFixed(0)}</td>`
              + `<td>${p.h.toFixed(1)}</td><td>${p.i.toFixed(0)}</td>`
              + `<td>${p.l}</td><td>${p.r}</td>`
              + `<td style="text-align:center">${p.o?'⚠':''}</td></tr>`;
    });
    if (peaks.length === 0) {
        rows += `<tr><td colspan="8" style="text-align:center;color:var(--dim);padding:8px">No peaks</td></tr>`;
    }
    document.getElementById('peaks-tbody').innerHTML = rows;
    drawGeo();
}

// =========================================================================
// Event loading
// =========================================================================
function loadEvent(evnum) {
    currentEvent = evnum;
    document.getElementById('ev-input').value = evnum;
    document.getElementById('status-bar').textContent = `Loading event ${evnum}...`;

    fetch(`/api/event/${evnum}`)
        .then(r => r.json())
        .then(data => {
            if (data.error) { document.getElementById('status-bar').textContent = data.error; return; }
            eventChannels = data.channels || {};
            const nch = Object.keys(eventChannels).length;
            const npk = Object.values(eventChannels).reduce((s,c) => s+(c.pk||[]).length, 0);
            document.getElementById('status-bar').textContent =
                `Event ${evnum}: ${nch} channels, ${npk} peaks`;
            drawGeo();
            if (selectedModule) showWaveform(selectedModule);
        })
        .catch(err => { document.getElementById('status-bar').textContent = `Error: ${err}`; });
}

// =========================================================================
// Init
// =========================================================================
const PLOT_LAYOUT = {
    paper_bgcolor:'#1a1a2e', plot_bgcolor:'#11112a',
    font:{family:'Consolas, monospace', size:11, color:'#aaa'},
    margin:{l:48, r:12, t:28, b:36},
    title:{text:'', font:{size:12, color:'#ccc'}},
    xaxis:{title:'Sample', gridcolor:'#1a1a3a', zerolinecolor:'#222'},
    yaxis:{title:'ADC', gridcolor:'#1a1a3a', zerolinecolor:'#222'},
    legend:{x:1, y:1, xanchor:'right', bgcolor:'rgba(0,0,0,0.6)', font:{size:10}},
};
const PLOT_CFG = {responsive:true, displayModeBar:false};

function init() {
    drawColorBar();
    initGeo();

    // create an empty plot so Plotly.react always has a valid target
    Plotly.newPlot('waveform-div', [], PLOT_LAYOUT, PLOT_CFG);

    // --- draggable divider ---
    const divider = document.getElementById('divider');
    const geoPanel = document.getElementById('geo-panel');
    let dragging = false;

    divider.addEventListener('mousedown', e => {
        dragging = true;
        divider.classList.add('active');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
        if (!dragging) return;
        const main = document.querySelector('.main');
        const rect = main.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const min = 300, max = rect.width - 280;
        geoPanel.style.width = Math.max(min, Math.min(max, x)) + 'px';
        resizeGeo();
        Plotly.Plots.resize('waveform-div');
    });
    document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        divider.classList.remove('active');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
    });

    // --- horizontal divider (between waveform and table) ---
    const hdivider = document.getElementById('hdivider');
    const wfDiv = document.getElementById('waveform-div');
    let hdragging = false;

    hdivider.addEventListener('mousedown', e => {
        hdragging = true;
        hdivider.classList.add('active');
        document.body.style.cursor = 'row-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
        if (!hdragging) return;
        const panel = document.getElementById('detail-panel');
        const rect = panel.getBoundingClientRect();
        const hdr = document.getElementById('detail-header').offsetHeight;
        const y = e.clientY - rect.top - hdr;
        const min = 100, max = rect.height - hdr - 80;
        wfDiv.style.height = Math.max(min, Math.min(max, y)) + 'px';
        Plotly.Plots.resize('waveform-div');
    });
    document.addEventListener('mouseup', () => {
        if (!hdragging) return;
        hdragging = false;
        hdivider.classList.remove('active');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
    });

    document.getElementById('btn-prev').onclick = () => { if (currentEvent>1) loadEvent(currentEvent-1); };
    document.getElementById('btn-next').onclick = () => { if (currentEvent<totalEvents) loadEvent(currentEvent+1); };
    document.getElementById('ev-input').onchange = e => {
        const v = parseInt(e.target.value);
        if (v>=1 && v<=totalEvents) loadEvent(v);
    };
    document.getElementById('color-metric').onchange = drawGeo;
    document.getElementById('log-scale').onchange = drawGeo;

    // canvas mouse
    const tip = document.getElementById('geo-tooltip');
    geoCanvas.addEventListener('mousemove', e => {
        const r = geoCanvas.getBoundingClientRect();
        const m = hitTest(e.clientX-r.left, e.clientY-r.top);
        if (m!==hoveredModule) { hoveredModule=m; drawGeo(); }
        if (m) {
            const d = eventChannels[`${m.roc}_${m.sl}_${m.ch}`];
            let t = `${m.n}  (${m.t==='G'?'PbGlass':'PbWO₄'})\nROC 0x${m.roc.toString(16)}  slot ${m.sl}  ch ${m.ch}`;
            if (d && d.pk && d.pk.length)
                t += `\nPed ${d.pm.toFixed(1)}  Peak ${d.pk[0].h.toFixed(0)}  Int ${d.pk[0].i.toFixed(0)}`;
            else if (d) t += `\nPed ${d.pm.toFixed(1)}  (no peaks)`;
            tip.textContent=t; tip.style.display='block';
            tip.style.left=(e.clientX-r.left+14)+'px';
            tip.style.top=(e.clientY-r.top-8)+'px';
        } else tip.style.display='none';
    });
    geoCanvas.addEventListener('click', e => {
        const r=geoCanvas.getBoundingClientRect();
        const m=hitTest(e.clientX-r.left, e.clientY-r.top);
        if (m) showWaveform(m);
    });
    geoCanvas.addEventListener('mouseleave', () => { hoveredModule=null; tip.style.display='none'; drawGeo(); });
    document.addEventListener('keydown', e => {
        if (e.target.tagName==='INPUT') return;
        if (e.key==='ArrowLeft' && currentEvent>1) loadEvent(currentEvent-1);
        if (e.key==='ArrowRight' && currentEvent<totalEvents) loadEvent(currentEvent+1);
    });

    // load config
    fetch('/api/config').then(r=>r.json()).then(data => {
        const crateRoc = data.crate_roc||{};
        const rawMods = data.modules||[], rawDaq = data.daq||[];
        if (rawMods.length && rawMods[0].roc !== undefined) {
            modules = rawMods.map(m => ({...m, t:m.t==='PbGlass'?'G':(m.t==='G'?'G':'W')}));
        } else {
            const dm = {}; for (const d of rawDaq) dm[d.name]=d;
            modules = [];
            for (const m of rawMods) {
                const d=dm[m.n]; if (!d) continue;
                modules.push({ n:m.n, t:m.t==='PbGlass'?'G':'W',
                    x:m.x, y:m.y, sx:m.sx, sy:m.sy,
                    roc:crateRoc[String(d.crate)]||0, sl:d.slot, ch:d.channel });
            }
        }
        totalEvents = data.total_events||0;
        document.getElementById('ev-total').textContent = `/ ${totalEvents}`;
        document.getElementById('header-info').textContent =
            `${modules.length} modules · ${totalEvents} events · ${Object.keys(crateRoc).length} crates`;
        resizeGeo();
        if (totalEvents>0) loadEvent(1);
    });
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
