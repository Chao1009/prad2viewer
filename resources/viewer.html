<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRad2 HyCal Event Viewer</title>
<script src="plotly-2.35.0.min.js"></script>
<link rel="stylesheet" href="viewer.css">
</head>
<body>

<div class="header">
    <h1>PRad2 HyCal Viewer</h1>
    <div class="nav" id="nav-file">
        <button id="btn-open" title="Open file" style="display:none">📂 Open</button>
        <button id="btn-prev" title="← key">◀</button>
        <input type="number" id="ev-input" value="1" min="1">
        <span style="color:var(--dim);font-size:12px" id="ev-total">/ 0</span>
        <button id="btn-next" title="→ key">▶</button>
    </div>
    <div class="nav" id="nav-online" style="display:none">
        <span id="et-status" style="font-size:12px;color:#f66">● Disconnected</span>
        <select id="ring-select" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:2px 6px;border-radius:3px;font-family:inherit;font-size:12px;min-width:120px"></select>
        <button id="btn-clear-hist" title="Clear all histograms and occupancy">Clear Entries</button>
        <button id="follow-status" style="font-size:11px;color:#ffd43b;background:none;border:1px solid #ffd43b;padding:2px 8px;border-radius:3px;display:none;cursor:pointer"></button>
    </div>
    <div class="info" id="header-info"></div>
</div>

<!-- file browser dialog -->
<div class="backdrop" id="file-backdrop"></div>
<div class="file-dialog" id="file-dialog">
    <div class="file-dialog-header">
        <span>Open EVIO File</span>
        <button id="file-dialog-close">&times;</button>
    </div>
    <div class="file-dialog-filter">
        <input type="text" id="file-filter" placeholder="Filter files...">
    </div>
    <div class="file-dialog-options">
        <label><input type="checkbox" id="hist-checkbox"> Process histograms</label>
    </div>
    <div class="file-dialog-list" id="file-list"></div>
</div>

<!-- progress overlay -->
<div class="progress-overlay" id="progress-overlay">
    <div class="progress-box">
        <h3 id="progress-title">Loading...</h3>
        <div class="progress-bar-outer"><div class="progress-bar-inner" id="progress-bar"></div></div>
        <div class="progress-text" id="progress-text">Preparing...</div>
    </div>
</div>

<div class="tab-bar" id="tab-bar">
    <button class="tab active" data-tab="dq">Data Quality</button>
    <button class="tab" data-tab="cluster">Clustering</button>
</div>

<div class="main">
    <div class="geo-panel" id="geo-panel">
        <div class="geo-toolbar" id="geo-toolbar-dq">
            <label>Color:</label>
            <select id="color-metric">
                <option value="integral">Peak Integral</option>
                <option value="height">Peak Height</option>
                <option value="count">Peak Count</option>
                <option value="time">Peak Time</option>
                <option value="pedestal">Pedestal</option>
                <option value="occupancy">Occupancy</option>
            </select>
            <label id="tcut-label">Time Cut</label>
            <input type="checkbox" id="time-cut">
            <label>Log</label>
            <input type="checkbox" id="log-scale" checked>
            <div class="color-bar">
                <span class="range-val" id="range-min-show">0</span>
                <input class="range-edit" id="range-min-edit" type="number" step="any">
                <span class="range-btn" id="range-min-btn" title="Edit min">✎</span>
                <canvas id="colorbar-canvas" width="120" height="12" style="cursor:pointer"></canvas>
                <span class="range-val" id="range-max-show">max</span>
                <input class="range-edit" id="range-max-edit" type="number" step="any">
                <span class="range-btn" id="range-max-btn" title="Edit max">✎</span>
            </div>
            <button id="btn-reset-view" class="geo-reset-btn" title="Reset view (double-click also works)">Reset</button>
        </div>
        <div class="geo-toolbar" id="geo-toolbar-cl" style="display:none">
            <label>Cluster:</label>
            <select id="cl-select"><option value="all">All</option></select>
            <label>Log</label>
            <input type="checkbox" id="cl-log-scale" checked>
            <div class="color-bar">
                <span class="range-val" id="cl-range-min-show">0</span>
                <input class="range-edit" id="cl-range-min-edit" type="number" step="any">
                <span class="range-btn" id="cl-range-min-btn" title="Edit min">&#x270E;</span>
                <canvas id="cl-colorbar-canvas" width="120" height="12" style="cursor:pointer"></canvas>
                <span class="range-val" id="cl-range-max-show">max</span>
                <input class="range-edit" id="cl-range-max-edit" type="number" step="any">
                <span class="range-btn" id="cl-range-max-btn" title="Edit max">&#x270E;</span>
            </div>
            <span style="margin-left:auto;color:var(--dim);font-size:11px" id="cl-summary"></span>
            <button class="geo-reset-btn" onclick="resetGeoView()" title="Reset view (double-click also works)">Reset</button>
        </div>
        <div class="geo-canvas-wrap" id="geo-wrap">
            <canvas id="geo-canvas"></canvas>
            <div class="geo-tooltip" id="geo-tooltip"></div>
        </div>
    </div>

    <div class="vdiv" id="div-main"></div>

    <!-- Data Quality detail panel -->
    <div class="detail-panel" id="detail-panel">
        <div class="detail-header" id="detail-header">
            <div class="empty-msg">Click a module to view details</div>
        </div>

        <!-- top: 2 histograms -->
        <div class="top-panel" id="top-panel">
            <div class="hist-cell">
                <div id="inthist-div" style="width:100%;height:100%"></div>
                <button id="btn-copy-inthist" class="copy-btn" title="Copy histogram data">copy</button>
            </div>
            <div class="hdiv" id="div-hist"></div>
            <div class="hist-cell">
                <div id="poshist-div" style="width:100%;height:100%"></div>
                <button id="btn-copy-poshist" class="copy-btn" title="Copy histogram data">copy</button>
            </div>
        </div>

        <div class="hdiv" id="div-tb"></div>

        <!-- bottom: table + waveform -->
        <div class="bottom-panel" id="bottom-panel">
            <div class="peaks-table-wrap" id="table-wrap">
                <table class="peaks-table">
                    <thead><tr>
                        <th>#</th><th>Pos</th><th>Time [ns]</th><th>Height</th>
                        <th>Integral</th><th>Left</th><th>Right</th><th>OVF</th>
                    </tr></thead>
                    <tbody id="peaks-tbody"></tbody>
                </table>
            </div>
            <div class="vdiv" id="div-tw"></div>
            <div class="waveform-wrap" id="waveform-wrap">
                <div id="waveform-div" style="width:100%;height:100%"></div>
                <button id="btn-copy-wf" class="copy-btn" title="Copy waveform data">copy</button>
            </div>
        </div>
    </div>

    <!-- Clustering detail panel -->
    <div class="detail-panel" id="cluster-panel" style="display:none">
        <div class="cl-hist-panel" id="cl-hist-panel">
            <div id="cl-energy-hist" style="width:100%;height:100%"></div>
            <button id="btn-copy-cl-hist" class="copy-btn" title="Copy histogram data">copy</button>
        </div>
        <div class="hdiv" id="div-cl-ht"></div>
        <div class="cluster-info-wrap" id="cl-table-wrap">
            <table class="peaks-table" id="cl-table">
                <thead><tr>
                    <th>#</th><th>Center</th><th>Energy [MeV]</th>
                    <th>X [mm]</th><th>Y [mm]</th><th>Blocks</th>
                </tr></thead>
                <tbody id="cl-tbody"></tbody>
            </table>
        </div>
        <div id="cl-detail-header">
            <span class="cl-info-text" id="cl-info-text">Click a module or select a cluster</span>
        </div>
        <div class="cl-lms-panel" id="cl-lms-panel" style="display:none">
            <div id="cl-lms-plot" style="width:100%;height:100%"></div>
        </div>
    </div>
</div>

<div class="status-bar" id="status-bar">Ready</div>

<script src="viewer.js"></script>
</body>
</html>
